<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Computing Practice Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Cloud Computing Quiz</h1>
    <button id="theme-toggle">Toggle Dark Mode</button>
  </header>

  <main class="container">
    <section id="home-screen" class="card">
      <h2>Configuration</h2>
      
      <div class="form-group">
        <label for="topic-select">Select Topic:</label>
        <select id="topic-select">
          <option value="All">All Topics</option>
          <option value="Cloud Basics">Cloud Basics</option>
          <option value="Security">Security</option>
          <option value="Docker">Docker</option>
        </select>
      </div>

      <div class="form-group">
        <label for="count-select">Number of Questions:</label>
        <select id="count-select">
          <option value="10">10</option>
          <option value="20">20</option>
          <option value="All">All Available</option>
        </select>
      </div>

      <div class="form-group">
        <label>Mode:</label>
        <div class="radio-group">
          <input type="radio" id="mode-practice" name="quiz-mode" value="practice" checked>
          <label for="mode-practice">Practice (Instant Feedback)</label>
          <input type="radio" id="mode-exam" name="quiz-mode" value="exam">
          <label for="mode-exam">Exam (Feedback at End)</label>
        </div>
      </div>

      <div class="form-group">
        <label>
          <input type="checkbox" id="timer-toggle"> Enable Timer (1 min per question)
        </label>
      </div>

      <p class="best-score-display">Best Score: <span id="best-score-val">0</span>%</p>
      
      <button id="start-btn" class="primary-btn">Start Quiz</button>
    </section>

    <section id="quiz-screen" class="card hidden">
      <div class="quiz-header">
        <span id="progress-text">Question 1/10</span>
        <span id="timer-display" class="hidden">00:00</span>
        <button id="bookmark-btn" class="icon-btn">🔖 Bookmark</button>
      </div>
      
      <div class="progress-bar-container">
        <div id="progress-bar"></div>
      </div>

      <h3 id="question-text">Question text goes here?</h3>
      <p id="question-instruction" class="instruction-text"></p>
      
      <div id="options-container">
        </div>

      <div id="instant-feedback" class="hidden"></div>

      <div class="quiz-footer">
        <button id="prev-btn" class="secondary-btn" disabled>Previous</button>
        <button id="check-btn" class="secondary-btn hidden">Check Answer</button>
        <button id="next-btn" class="primary-btn">Next</button>
        <button id="submit-btn" class="primary-btn hidden">Submit Quiz</button>
      </div>
    </section>

    <section id="result-screen" class="card hidden">
      <h2>Quiz Results</h2>
      <div class="score-display">
        <h3 id="score-text">You scored X out of Y</h3>
        <h1 id="percentage-text">0%</h1>
      </div>

      <div id="topic-performance">
        </div>

      <div class="result-actions">
        <button id="review-btn" class="secondary-btn">Review Answers</button>
        <button id="retry-incorrect-btn" class="secondary-btn hidden">Retry Incorrect</button>
        <button id="restart-btn" class="primary-btn">Back to Home</button>
      </div>

      <div id="review-container" class="hidden">
        </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
